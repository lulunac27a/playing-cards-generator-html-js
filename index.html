<!doctype html>
<html lang="en">
    <head>
        <title>Playing Cards Generator</title>
        <link rel="stylesheet" href="main.css" />
    </head>
    <body>
        <h1>Playing Cards Generator</h1>
        <p>Click the button to generate a random playing card:</p>
        <input
            type="number"
            id="numCards"
            placeholder="Number of cards to generate"
            min="1"
            max="52"
        />
        <!--button to generate card--><button onclick="generateCard()">
            Generate Card
        </button>
        <div id="card"></div>
        <script src="main.js"></script>
    </body>
</html>
